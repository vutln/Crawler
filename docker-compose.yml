services:
  backend:
    build:
      context: ./backend
    restart: always
    environment:
      DATABASE_URL: mysql://crawler:CGSUyIMw2Zzek3Fp3Sp1U4w8@192.168.2.105:3306/crawler
      CRAWL_COOKIES_JSON: '[{"name":"i18n-prefs","value":"USD","domain":".amazon.com","path":"/"},{"name":"lc-main","value":"en_US","domain":".amazon.com","path":"/"}]'
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend
